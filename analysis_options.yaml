# Static analysis configuration for the futevôlei app.
#
# Base: the recommended Flutter lint set. On top of it we enable stricter
# analyzer language modes, elevate a few important diagnostics, and turn on a
# curated set of lints for app quality. `custom_lint` (with `riverpod_lint`) is
# registered as an analyzer plugin; those rules are surfaced by
# `dart run custom_lint` and in the IDE, not by `flutter analyze`.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - "**/*.gr.dart"
    - "build/**"
  errors:
    dead_code: error
    unused_import: error
    unused_local_variable: error
    unused_element: warning
    unnecessary_import: warning
    duplicate_import: warning
    invalid_assignment: error
    missing_required_param: error
    missing_return: error
    todo: info
  plugins:
    - custom_lint

linter:
  rules:
    - prefer_single_quotes
    - require_trailing_commas
    - sort_child_properties_last
    - directives_ordering
    - always_use_package_imports

    - avoid_print
    - avoid_dynamic_calls
    - avoid_empty_else
    - cancel_subscriptions
    - close_sinks
    - collection_methods_unrelated_type
    - no_duplicate_case_values
    - no_logic_in_create_state
    - use_build_context_synchronously

    - unnecessary_lambdas
    - unnecessary_parenthesis
    - unnecessary_string_interpolations
    - unnecessary_this
    - prefer_final_fields
    - prefer_final_locals
    - prefer_final_in_for_each
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - prefer_const_declarations

    - unawaited_futures
    - discarded_futures

    - avoid_positional_boolean_parameters
    - avoid_bool_literals_in_conditional_expressions
    - avoid_redundant_argument_values
